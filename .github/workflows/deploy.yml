# SL-SPORTS — Build & Deploy to K3s
# Fichier à copier dans le repo SL-SPORTS : .github/workflows/deploy.yml
name: Deploy Sports

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sylvaiinn/sl-sports

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── Checkout ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Écrire le Dockerfile (inline, repo Refonteinfra privé) ──
      - name: Write Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          # ── Stage 1: Dependencies ──
          FROM node:20-alpine AS deps
          RUN apk add --no-cache libc6-compat
          WORKDIR /app
          COPY sports-app/package.json sports-app/package-lock.json* ./
          RUN npm ci && npm cache clean --force

          # ── Stage 2: Builder ──
          FROM node:20-alpine AS builder
          WORKDIR /app
          COPY --from=deps /app/node_modules ./node_modules
          COPY sports-app/ .

          ENV NEXT_TELEMETRY_DISABLED=1
          ENV NODE_ENV=production

          ARG NEXT_PUBLIC_SUPABASE_URL
          ARG NEXT_PUBLIC_SUPABASE_ANON_KEY
          ARG NEXT_PUBLIC_APP_DOMAIN
          ENV NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
          ENV NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
          ENV NEXT_PUBLIC_APP_DOMAIN=$NEXT_PUBLIC_APP_DOMAIN

          RUN npm run build

          # ── Stage 3: Runner ──
          FROM node:20-alpine AS runner
          WORKDIR /app

          ENV NODE_ENV=production
          ENV NEXT_TELEMETRY_DISABLED=1
          ENV PORT=3000
          ENV HOSTNAME="0.0.0.0"

          RUN addgroup --system --gid 1001 nodejs
          RUN adduser --system --uid 1001 nextjs

          COPY --from=builder /app/public ./public
          COPY --from=builder --chown=nextjs:nodejs /app/.next/standalone ./
          COPY --from=builder --chown=nextjs:nodejs /app/.next/static ./.next/static

          USER nextjs

          EXPOSE 3000

          CMD ["node", "server.js"]
          EOF

          cat > .dockerignore << 'EOF'
          node_modules
          .next
          .git
          EOF

      # ── Docker Login ──
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & Push ──
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://plcyogezfhubgrbbkddd.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsY3lvZ2V6Zmh1YmdyYmJrZGRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTAyMjgsImV4cCI6MjA4OTIyNjIyOH0.4Xr5FjA_W4WGjGd072cx6SKaLUlvOerTqLicvIbWJ40
            NEXT_PUBLIC_APP_DOMAIN=sports.sl-information.fr
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # ── Deploy to K3s ──
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to K3s
        run: |
          kubectl set image deployment/sports \
            sports=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n sports

          kubectl rollout status deployment/sports -n sports --timeout=120s
