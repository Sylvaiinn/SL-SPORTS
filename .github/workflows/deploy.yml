# SL-SPORTS — Build & Deploy to K3s
# Fichier à copier dans le repo SL-SPORTS : .github/workflows/deploy.yml
name: Deploy Sports

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sylvaiinn/sl-sports

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── Checkout ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Récupérer le Dockerfile depuis Refonteinfra ──
      - name: Get Dockerfile from Refonteinfra
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/Sylvaiinn/Refonteinfra/master/sports/Dockerfile" \
            -o Dockerfile
          curl -fsSL \
            "https://raw.githubusercontent.com/Sylvaiinn/Refonteinfra/master/sports/.dockerignore" \
            -o .dockerignore

      # ── Docker Login ──
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & Push ──
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://plcyogezfhubgrbbkddd.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsY3lvZ2V6Zmh1YmdyYmJrZGRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTAyMjgsImV4cCI6MjA4OTIyNjIyOH0.4Xr5FjA_W4WGjGd072cx6SKaLUlvOerTqLicvIbWJ40
            NEXT_PUBLIC_APP_DOMAIN=sports.sl-information.fr
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # ── Deploy to K3s ──
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to K3s
        run: |
          kubectl set image deployment/sports \
            sports=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n sports

          kubectl rollout status deployment/sports -n sports --timeout=120s
